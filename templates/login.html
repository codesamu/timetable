<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in | Worker Timetable</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-[#f5f5f7] text-slate-900 antialiased">
    <div class="relative flex min-h-screen items-center justify-center overflow-hidden p-6">
      <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,#ffffff_0%,#f5f5f7_60%,#eceef3_100%)]"></div>

      <main class="relative w-full max-w-md rounded-[28px] border border-white/80 bg-white/90 p-7 shadow-[0_18px_50px_rgba(15,23,42,0.08)] backdrop-blur-sm md:p-9">
        <p class="text-xs font-medium uppercase tracking-[0.2em] text-slate-400">Timetable</p>
        <h1 class="mt-2 text-3xl font-semibold tracking-tight text-slate-900">Sign in</h1>
        <p class="mt-2 text-sm text-slate-500">Use the shared team password to continue.</p>

        <form method="post" class="mt-6 space-y-4">
          <label class="block">
            <span class="mb-1.5 block text-sm font-medium text-slate-600">Shared password</span>
            <input
              type="password"
              name="password"
              required
              class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-slate-900 placeholder:text-slate-400 outline-none transition focus:border-slate-400 focus:ring-4 focus:ring-slate-200/70"
              placeholder="Enter password"
            />
          </label>

          {% if error %}
          <p class="rounded-xl border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">{{ error }}</p>
          {% endif %}

          <button
            type="submit"
            class="w-full rounded-2xl bg-slate-900 px-4 py-3 text-sm font-semibold text-white transition hover:bg-slate-800"
          >
            Sign in
          </button>
        </form>
      </main>
    </div>
  </body>
</html>
